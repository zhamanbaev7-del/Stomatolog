name: Encoding Check

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  encoding-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run encoding check
        run: npm run check:encoding
